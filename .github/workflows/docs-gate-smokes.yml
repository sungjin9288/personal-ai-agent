name: Docs gate smokes

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  docs-gate-smokes:
    name: Target and enterprise documentation gate smokes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Show Node.js version
        run: node --version

      - name: Run target and enterprise documentation gate smokes
        run: npm run smoke:docs-gates
